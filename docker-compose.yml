services:
  db:
    image: mysql:8.0
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-roomie_match}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-roomie_match_root}
      MYSQL_USER: ${MYSQL_USER:-roomie_match}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-roomie_match_password}
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$${MYSQL_ROOT_PASSWORD} --silent"]
      interval: 5s
      timeout: 5s
      retries: 20

  api:
    build:
      context: .
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: mysql+pymysql://${MYSQL_USER:-roomie_match}:${MYSQL_PASSWORD:-roomie_match_password}@db:3306/${MYSQL_DATABASE:-roomie_match}?charset=utf8mb4
      JWT_SECRET: ${JWT_SECRET:-change-me-to-a-long-random-string}
      JWT_EXPIRE_MINUTES: ${JWT_EXPIRE_MINUTES:-60}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      APP_DEBUG: ${APP_DEBUG:-false}
    ports:
      - "${API_PORT:-8000}:8000"
    volumes:
      - .:/app
    command: >
      sh -c "alembic upgrade head &&
      uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"

volumes:
  mysql_data:
